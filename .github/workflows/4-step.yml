name: Step 4

on:
  push:
    branches:
      - main
    paths:
      - _posts/*.md

permissions:
  contents: write
  actions: write
  issues: write

env:
  REVIEW_FILE: ".github/steps/x-review.md"

jobs:
  find_exercise:
    name: 실습 이슈 찾기
    uses: skills/exercise-toolkit/.github/workflows/find-exercise-issue.yml@v0.6.0

  post_review_content:
    name: 리뷰 콘텐츠 게시
    needs: [find_exercise]
    runs-on: ubuntu-latest
    env:
      ISSUE_URL: ${{ needs.find_exercise.outputs.issue-url }}

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: 댓글 생성 - 단계 콘텐츠 추가
        run: |
          gh issue comment "$ISSUE_URL" \
            --body-file "$REVIEW_FILE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 현재 워크플로우 비활성화
        run: gh workflow disable "${{github.workflow}}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Workshop Tracker에 완료 보고
        if: success()
        continue-on-error: true
        run: |
          curl -sf -X POST "https://workshop-tracker-api.jollyocean-9c92d5de.koreacentral.azurecontainerapps.io/api/events" \
            -H "Content-Type: application/json" \
            -d '{
              "sessionId": "fe72e72d",
              "type": "completed",
              "username": "'"$GITHUB_ACTOR"'",
              "repo": "'"$GITHUB_REPOSITORY"'",
              "track": "github-pages",
              "runId": "'"$GITHUB_RUN_ID"'"
            }'

  finish_exercise:
    name: 실습 완료
    needs: [find_exercise, post_review_content]
    uses: skills/exercise-toolkit/.github/workflows/finish-exercise.yml@v0.6.0
    with:
      issue-url: ${{ needs.find_exercise.outputs.issue-url }}
      exercise-title: "GitHub Pages"
